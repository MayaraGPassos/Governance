<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body {
  font-family: Segoe UI;
  background: #f5f5f5;
  margin: 0;
  padding: 30px;
}

/* Container */
.flow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}

/* Blocos */
.step {
  position: relative;
  width: 180px;
  padding: 20px;
  background: white;
  border-radius: 12px;
  border: 2px solid #0078d4;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.step:hover {
  background: #0078d4;
  color: white;
  transform: translateY(-5px);
}

/* Tooltip */
.step::after {
  content: "Adicione aqui seu texto";
  position: absolute;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  background: #323130;
  color: white;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
}

/* Mostrar tooltip */
.step:hover::after {
  opacity: 1;
}

/* Linha */
.line {
  height: 3px;
  background: #ccc;
  flex-grow: 1;
}

/* Título */
h2 {
  margin-bottom: 30px;
}

</style>
</head>

<body>

<h2>Governance Operating Model</h2>

<div class="flow">

  <div class="step" onclick="openLink()">Kick-off Meeting</div>

  <div class="line"></div>

  <div class="step" onclick="openLink()">Planning Approved</div>

  <div class="line"></div>

  <div class="step" onclick="openLink()">Project Tasks</div>

  <div class="line"></div>

  <div class="step" onclick="openLink()">Timeline Updated</div>

  <div class="line"></div>

  <div class="step" onclick="openLink()">Decision Making</div>

</div>

<script>
function openLink() {
  window.open("https://abbott.sharepoint.com/sites/BR-EPD-GOVERNANCE", "_blank");
}
</script>

</body>
</html>
